<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSS Hunter – Dashboard Trigger</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: monospace;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            border-bottom: 1px solid #00ff00;
            display: inline-block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
            font-size: 12px;
            vertical-align: top;
        }
        th {
            background: #1a1a1a;
        }
        .marker {
            color: #ffaa00;
        }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .note {
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📡 XSS Hunter Dashboard</h1>
    <button onclick="loadTriggers()">🔄 Refresh</button>
    <div id="triggersTable">Loading...</div>
    <div class="note">Data diambil dari Redis (100 trigger terakhir).</div>
</div>

<script>
    async function loadTriggers() {
        const container = document.getElementById('triggersTable');
        container.innerHTML = '<div>Loading...</div>';
        try {
            const res = await fetch('/api/triggers');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (!data.triggers || data.triggers.length === 0) {
                container.innerHTML = '<p>Belum ada trigger. Kirim payload XSS dulu!</p>';
                return;
            }
            let html = `<tr>
                <tr><th>Marker</th><th>URL</th><th>Cookies</th><th>IP</th><th>User-Agent</th><th>Waktu</th></tr>`;
            for (let t of data.triggers) {
                html += `<tr>
                    <td class="marker">${escapeHtml(t.marker)}</td>
                    <td style="word-break:break-all;">${escapeHtml(t.url)}</td>
                    <td style="max-width:200px; overflow-x:auto;">${escapeHtml(t.cookies)}</td>
                    <td>${escapeHtml(t.ip)}</td>
                    <td style="max-width:200px;">${escapeHtml(t.userAgent)}</td>
                    <td>${new Date(t.timestamp).toLocaleString()}</td>
                </tr>`;
            }
            html += `</table>`;
            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = `<p style="color:red;">Gagal memuat data: ${err.message}<br>Pastikan file /api/triggers sudah ada dan Redis terkonfigurasi.</p>`;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadTriggers();
    setInterval(loadTriggers, 15000);
</script>
</body>
</html>
